<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #0f172a; color: #f8fafc; }
        .container { text-align: center; padding: 40px; background: #1e293b; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid #334155; max-width: 450px; width: 90%; }
        h1 { color: #38bdf8; margin-bottom: 5px; font-size: 32px; font-weight: 700; text-transform: capitalize; }
        p { color: #94a3b8; font-size: 16px; margin-top: 15px; }
        .loader { width: 40px; height: 40px; border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <!-- इथे क्लायंटच्या वेबसाईटचे नाव ऑटोमॅटिक येईल -->
        <h1 id="brand-name">Loading...</h1>
        <p>वेबसाईटचे काम प्रगतीपथावर आहे. आम्ही लवकरच येत आहोत!</p>
        <div class="loader"></div>
    </div>

    <script>
        // ब्राउझरच्या URL मधून डोमेन नाव मिळवणे
        const host = window.location.hostname;
        
        // मुख्य डोमेन आणि vercel.app बाजूला काढून फक्त क्लायंटचे नाव वेगळे करणे
        let cleanName = host.replace('www.', '').split('.')[0];
        
        // जर ते तुमच्या एजन्सीचे मुख्य नाव असेल तर पूर्ण दाखवणे
        if (host.includes('scalelogicstudio.com') && !host.startsWith('shubhsolar') && !host.includes('subdomain')) {
            cleanName = "ScaleLogic Studio";
        }

        // स्क्रीनवर नाव सेट करणे आणि कॅपिटलाइज (पहिले अक्षर मोठे) करणे
        document.getElementById('brand-name').innerText = cleanName;
        document.title = cleanName + " | Coming Soon";
    </script>
</body>
</html>
