<!DOCTYPE html>
<html lang="mr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Coming Soon</title>
    <style>
        body { font-family: 'Segoe UI', Arial, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #0f172a; color: #f8fafc; }
        .container { text-align: center; padding: 40px; background: #1e293b; border-radius: 12px; box-shadow: 0 10px 15px -3px rgba(0,0,0,0.3); border: 1px solid #334155; max-width: 400px; width: 90%; }
        h1 { color: #38bdf8; margin-bottom: 5px; font-size: 28px; text-transform: lowercase; }
        p { color: #94a3b8; font-size: 16px; margin-top: 15px; }
        .loader { width: 40px; height: 40px; border: 4px solid #334155; border-top: 4px solid #38bdf8; border-radius: 50%; animation: spin 1s linear infinite; margin: 20px auto 0 auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="container">
        <h1 id="domain-name">website</h1>
        <p>Website Design in Progress 
Launching Soon!</p>
        <div class="loader"></div>
    </div>

    <script>
        // ब्राउझरमधून डोमेन नाव (उदा. tagit.in) ऑटोमॅटिक उचलणे
        const currentDomain = window.location.hostname.replace('www.', '');
        if(currentDomain && !currentDomain.includes('vercel.app')) {
            document.title = currentDomain + " | Coming Soon";
            document.getElementById('domain-name').innerText = currentDomain;
        } else {
            document.title = "ScaleLogic Studio | Setup";
            document.getElementById('domain-name').innerText = "ScaleLogic Studio";
        }
    </script>
</body>
</html>
